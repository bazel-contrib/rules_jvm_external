matrix:
  platform:
  - debian10
  - ubuntu2004
  - macos_arm64
  - windows
  bazel:
  - 9.x
  - 8.x
  - 7.x

tasks:
  verify_targets:
    name: Verify build targets
    platform: ${{ platform }}
    bazel: ${{ bazel }}
    build_targets:
    - '@rules_jvm_external//:implementation'
    - '@rules_jvm_external//private/tools/java/...'

incompatible_flags:
  "--incompatible_autoload_externally=":
    - "7.x"

bcr_test_module:
  module_path: examples/java-export
  matrix:
    platform:
    - debian10
    - ubuntu2004
    - macos_arm64
    - windows
    bazel:
    - 8.x
    - 7.x
  tasks:
    run_test_module:
      name: Run test module
      platform: ${{ platform }}
      bazel: ${{ bazel }}
      build_targets:
      - //...
